# ===== BASE CONFIGURATION =====
# Profile-specific settings go in application-dev.properties or application-prod.properties
# Activate a profile with: --spring.profiles.active=dev  (or prod)

# Database
spring.datasource.url=jdbc:mysql://mysqldb:3306/products_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson — serialize LocalDateTime as ISO string, not array
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
